services:
  - type: web
    runtime: static
    name: curbwise
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
      - key: VITE_GOOGLE_MAPS_MAP_ID
        sync: false
      - key: VITE_CONVEX_URL
        sync: false
